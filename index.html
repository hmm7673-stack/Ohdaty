<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>عهدتي | Ohdaty</title>
<meta name="theme-color" content="#14477A" />
<link rel="manifest" id="app-manifest-link" />
<link rel="icon" id="app-favicon-link" />
<link rel="apple-touch-icon" id="app-touch-icon-link" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ohdaty" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  :root{
    --bg:#F7F4E9;
    --surface:#FFFFFF;
    --border:#E6E0CC;
    --navy:#14477A;
    --navy-dark:#0E3459;
    --teal:#1AA6B7;
    --teal-light:#5FD6C4;
    --gradient: linear-gradient(135deg,var(--navy) 0%, var(--teal) 100%);
    --text:#20293A;
    --muted:#6B7280;
    --success:#1F9D55;
    --success-bg:#E7F6EC;
    --warning:#B5790A;
    --warning-bg:#FDF1DC;
    --danger:#C0392B;
    --danger-bg:#FBEAE8;
    --radius:14px;
    --font-ar:'Tajawal', sans-serif;
    --font-display:'Poppins', sans-serif;
    --font-body:'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);}
  body{font-family:var(--font-ar);-webkit-font-smoothing:antialiased;}
  body.lang-en{font-family:var(--font-body);}
  h1,h2,h3,.display{font-family:var(--font-display);}
  body.lang-ar h1,body.lang-ar h2,body.lang-ar h3,body.lang-ar .display{font-family:var(--font-ar);}
  button{font-family:inherit;cursor:pointer;}
  a{color:inherit;}
  ::selection{background:var(--teal-light);}

  /* ---------- utility ---------- */
  .hidden{display:none !important;}
  .btn{
    border:none;border-radius:10px;padding:11px 20px;font-size:14.5px;font-weight:600;
    display:inline-flex;align-items:center;gap:8px;transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--gradient);color:#fff;box-shadow:0 6px 16px -6px rgba(20,71,122,.5);}
  .btn-primary:hover{box-shadow:0 8px 20px -6px rgba(20,71,122,.65);}
  .btn-outline{background:transparent;border:1.5px solid var(--navy);color:var(--navy);}
  .btn-outline:hover{background:rgba(20,71,122,.06);}
  .btn-success{background:var(--success);color:#fff;}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-ghost{background:transparent;color:var(--muted);padding:8px 12px;}
  .btn-sm{padding:7px 14px;font-size:13px;}
  .btn:disabled{opacity:.55;cursor:not-allowed;}

  input[type=text],input[type=email],input[type=password],input[type=tel],select,textarea{
    width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;
    font-size:14.5px;font-family:inherit;background:#fff;color:var(--text);
  }
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(26,166,183,.15);}
  label{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:6px;display:block;}
  .field{margin-bottom:16px;}
  .error-text{color:var(--danger);font-size:13px;margin-top:6px;}

  .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:12.5px;font-weight:700;}
  .badge-custody{background:var(--success-bg);color:var(--success);}
  .badge-pending{background:var(--warning-bg);color:var(--warning);}
  .badge-warehouse{background:#E7EEF6;color:var(--navy);}
  .badge-maintenance{background:var(--danger-bg);color:var(--danger);}

  /* signature shield-check icon (from brand mark) */
  .shield-icon{width:1em;height:1em;flex:none;}

  /* ---------- LOGIN ---------- */
  #login-view{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .login-card{width:100%;max-width:420px;background:var(--surface);border-radius:20px;padding:36px 32px;
    box-shadow:0 20px 60px -20px rgba(20,71,122,.25);border:1px solid var(--border);}
  .lang-switch{display:flex;justify-content:center;margin-bottom:22px;}
  .lang-switch-inner{border:1.5px solid var(--navy);border-radius:22px;display:flex;overflow:hidden;}
  .lang-btn{padding:7px 18px;font-size:13.5px;font-weight:700;background:transparent;border:none;color:var(--navy);}
  .lang-btn.active{background:var(--gradient);color:#fff;}
  .login-logo-wrap{text-align:center;margin-bottom:6px;}
  .login-logo-wrap img{width:96px;height:96px;object-fit:contain;}
  .login-title{text-align:center;font-size:24px;font-weight:800;color:var(--navy);margin:6px 0 2px;}
  .login-tagline{text-align:center;font-size:13.5px;color:var(--muted);margin-bottom:26px;}
  .login-submit{width:100%;justify-content:center;padding:13px;font-size:15px;margin-top:6px;}

  /* ---------- APP SHELL ---------- */
  #app-view{display:flex;min-height:100vh;}
  .sidebar{width:250px;background:var(--navy-dark);color:#fff;flex:none;padding:22px 16px;display:flex;flex-direction:column;}
  .sidebar-logo{display:flex;align-items:center;gap:10px;padding:0 6px 20px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:18px;}
  .sidebar-logo img{width:38px;height:38px;object-fit:contain;}
  .sidebar-logo b{font-size:16px;font-family:var(--font-display);}
  .nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;color:rgba(255,255,255,.75);
    font-size:14px;font-weight:600;margin-bottom:4px;border:none;background:transparent;width:100%;text-align:inherit;}
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
  .nav-item.active{background:rgba(255,255,255,.14);color:#fff;}
  .sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.12);}
  .user-chip{display:flex;align-items:center;gap:10px;padding:8px 6px;font-size:13px;color:rgba(255,255,255,.85);}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;color:#fff;flex:none;}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{background:#fff;border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;}
  .topbar h2{margin:0;font-size:19px;color:var(--navy);}
  .content{padding:26px 28px;flex:1;overflow-y:auto;}

  .lang-switch-mini{border:1.5px solid var(--border);border-radius:18px;display:flex;overflow:hidden;}
  .lang-switch-mini button{padding:5px 13px;font-size:12.5px;font-weight:700;border:none;background:transparent;color:var(--muted);}
  .lang-switch-mini button.active{background:var(--navy);color:#fff;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:20px;}
  .card-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .card-title h3{margin:0;font-size:16.5px;color:var(--navy);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
  .asset-card{border:1px solid var(--border);border-radius:12px;padding:14px 16px;background:#FCFBF6;}
  .asset-card .name{font-weight:700;font-size:14.5px;margin-bottom:3px;}
  .asset-card .meta{font-size:12.5px;color:var(--muted);margin-bottom:10px;}
  .asset-card .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:start;color:var(--muted);font-weight:700;padding:10px 8px;border-bottom:2px solid var(--border);font-size:12.5px;}
  td{padding:11px 8px;border-bottom:1px solid var(--border);}
  tr:last-child td{border-bottom:none;}

  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);}
  .empty-state .shield-icon{width:46px;height:46px;opacity:.35;margin-bottom:10px;}

  /* ---------- MODAL ---------- */
  .modal-backdrop{position:fixed;inset:0;background:rgba(14,52,89,.45);display:flex;align-items:center;justify-content:center;
    padding:20px;z-index:50;}
  .modal{background:#fff;border-radius:18px;padding:26px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 4px;color:var(--navy);}
  .modal .sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .modal-actions .btn{flex:1;justify-content:center;}
  #qr-reader{width:100%;border-radius:12px;overflow:hidden;margin-bottom:10px;}
  .qr-status{font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:12px;}
  .qr-status.ok{background:var(--success-bg);color:var(--success);}
  .qr-status.wait{background:var(--warning-bg);color:var(--warning);}

  .toast-wrap{position:fixed;bottom:20px;inset-inline-start:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;}
  body.lang-ar .toast-wrap{transform:translateX(50%);}
  .toast{background:var(--navy-dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;box-shadow:0 10px 30px -10px rgba(0,0,0,.4);}
  .toast.error{background:var(--danger);}
  .toast.success{background:var(--success);}

  @media (max-width: 820px){
    .sidebar{position:fixed;inset-inline-start:0;top:0;bottom:0;z-index:40;transform:translateX(-100%);transition:transform .2s;}
    body.lang-ar .sidebar{transform:translateX(100%);}
    .sidebar.open{transform:translateX(0);}
    .content{padding:18px;}
    .topbar{padding:14px 16px;}
    #menu-toggle{display:inline-flex !important;}
    .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:39;}
    .sidebar-backdrop.open{display:block;}
  }
</style>
</head>

<!-- ===================== LOGIN VIEW ===================== -->
<div id="login-view">
  <div class="login-card">
    <div class="lang-switch">
      <div class="lang-switch-inner">
        <button class="lang-btn" data-lang="ar" id="lang-ar-btn">العربية</button>
        <button class="lang-btn" data-lang="en" id="lang-en-btn">English</button>
      </div>
    </div>
    <div class="login-logo-wrap"><img id="login-logo-img" alt="Ohdaty"/></div>
    <div class="login-title" data-i18n="appName">عهدتي</div>
    <div class="login-tagline" data-i18n="tagline">إدارة الالتزامات والأمانات</div>

    <form id="login-form">
      <div class="field">
        <label data-i18n="username">اسم المستخدم</label>
        <input type="text" id="login-username" autocapitalize="off" autocorrect="off" required />
      </div>
      <div class="field">
        <label data-i18n="password">كلمة المرور</label>
        <input type="password" id="login-password" required />
      </div>
      <div id="login-error" class="error-text hidden"></div>
      <button type="submit" class="btn btn-primary login-submit" id="login-submit-btn">
        <span data-i18n="login">تسجيل الدخول</span>
      </button>
    </form>
  </div>
</div>

<!-- ===================== APP SHELL ===================== -->
<div id="app-view" class="hidden">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img id="sidebar-logo-img" alt="logo"/>
      <b data-i18n="appName">عهدتي</b>
    </div>
    <nav id="nav-list"></nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar" id="user-avatar">?</div>
        <div>
          <div id="user-name" style="font-weight:700;"></div>
          <div id="user-role" style="opacity:.7;font-size:11.5px;"></div>
        </div>
      </div>
      <button class="nav-item" id="logout-btn" style="margin-top:8px;">
        <span data-i18n="logout">تسجيل الخروج</span>
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="btn btn-ghost" id="menu-toggle" style="display:none;">☰</button>
        <h2 id="view-title" data-i18n="myCustody">عهدتي</h2>
      </div>
      <div class="lang-switch-mini">
        <button data-lang="ar" id="mini-ar">AR</button>
        <button data-lang="en" id="mini-en">EN</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<div class="toast-wrap" id="toast-wrap"></div>

/* تطبيق ثانوي منفصل: يُستخدم فقط لإنشاء حسابات المستخدمين الجدد
   بدون ما يسجل خروج الأدمن الحالي من جلسته */
const secondaryApp = initializeApp(firebaseConfig, "Secondary");
const secondaryAuth = getAuth(secondaryApp);

const USERNAME_DOMAIN = "ohdaty.local"; // يوزرنيم يتحول داخلياً لبريد وهمي بهذا النطاق

/* ---------------- عمليات Firestore مباشرة (بديل Cloud Functions) ---------------- */
async function requestTransfer({assetId, assetName, toUserId, toUserName, notes}){
  const assetSnap = await getDoc(doc(db,"assets",assetId));
  const prevStatus = assetSnap.data()?.status || "in_warehouse";
  await addDoc(collection(db,"transfers"),{
    assetId, assetName,
    fromUserId: currentUserDoc.uid, fromUserName: currentUserDoc.fullName,
    toUserId, toUserName, notes: notes||"",
    prevStatus, status:"pending", createdAt: serverTimestamp()
  });
  await updateDoc(doc(db,"assets",assetId), { status:"pending_transfer", lastSentAt: serverTimestamp() });
}

async function acceptTransfer({transferId, gpsLocation, conditionImageUrl, conditionStatus}){
  const trSnap = await getDoc(doc(db,"transfers",transferId));
  if(!trSnap.exists()) throw new Error(t("loginError"));
  const tr = trSnap.data();
  const batch = writeBatch(db);
  batch.update(doc(db,"transfers",transferId), {
    status:"accepted", gpsLocation: gpsLocation||null,
    conditionImageUrl: conditionImageUrl||null, conditionStatus: conditionStatus||null,
    acceptedAt: serverTimestamp()
  });
  batch.update(doc(db,"assets",tr.assetId), {
    status:"in_custody", currentHolderId: currentUserDoc.uid, currentHolderName: currentUserDoc.fullName,
    lastReceivedAt: serverTimestamp(), lastReceivedLocation: gpsLocation||null,
    lastReceiptImageUrl: conditionImageUrl||null, lastConditionStatus: conditionStatus||null
  });
  await batch.commit();
  await addDoc(collection(db,"auditLog"),{
    action:`${tr.assetName}: ${t("accepted")} (${conditionStatus==="good"?t("conditionGood"):t("conditionBad")})`,
    performedByName: currentUserDoc.fullName,
    location: gpsLocation||null, timestamp: serverTimestamp()
  });
}

async function rejectTransfer({transferId}){
  const trSnap = await getDoc(doc(db,"transfers",transferId));
  if(!trSnap.exists()) return;
  const tr = trSnap.data();
  const batch = writeBatch(db);
  batch.update(doc(db,"transfers",transferId), { status:"rejected" });
  batch.update(doc(db,"assets",tr.assetId), {
    status: tr.fromUserId ? "in_custody" : "in_warehouse",
    currentHolderId: tr.fromUserId || null, currentHolderName: tr.fromUserName || null
  });
  await batch.commit();
  await addDoc(collection(db,"auditLog"),{
    action:`${tr.assetName}: ${t("rejected")}`, performedByName: currentUserDoc.fullName,
    location: null, timestamp: serverTimestamp()
  });
}

async function createAssetDirect({name, category, serialNumber}){
  await addDoc(collection(db,"assets"),{
    name, category: category||"", serialNumber: serialNumber||"",
    status:"in_warehouse", currentHolderId:null, currentHolderName:null, createdAt: serverTimestamp()
  });
}

async function createUserByAdmin({fullName, username, password, phone, role}){
  const uname = username.trim().toLowerCase();
  if(!uname || !/^[a-z0-9_.]{3,20}$/.test(uname)) throw new Error(t("invalidUsername"));
  const unameSnap = await getDoc(doc(db,"usernames",uname));
  if(unameSnap.exists()) throw new Error(t("usernameTaken"));
  const fakeEmail = `${uname}@${USERNAME_DOMAIN}`;
  const cred = await createUserWithEmailAndPassword(secondaryAuth, fakeEmail, password);
  const newUid = cred.user.uid;
  await signOut(secondaryAuth);
  const batch = writeBatch(db);
  batch.set(doc(db,"users",newUid), {
    fullName, username: uname, phone: phone||"", role, disabled:false, preferredLanguage: lang
  });
  batch.set(doc(db,"usernames",uname), { uid:newUid, email:fakeEmail });
  await batch.commit();
}

function fmtDate(ts){
  return ts ? ts.toDate().toLocaleString(lang==="ar"?"ar-SA":"en-US") : "-";
}
function fmtLoc(loc){
  return loc ? `${loc.lat.toFixed(5)}, ${loc.lng.toFixed(5)}` : "-";
}
/* ضغط الصورة قبل الرفع (يحوّلها لـ JPEG بحجم أصغر) — يمنع تعليق عملية الرفع بسبب صور الكاميرا الكبيرة */
function compressImage(file, maxDim=640, quality=0.5){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      let { width, height } = img;
      if(width > maxDim || height > maxDim){
        const scale = maxDim / Math.max(width, height);
        width = Math.round(width*scale); height = Math.round(height*scale);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob=>{
        URL.revokeObjectURL(url);
        blob ? resolve(blob) : reject(new Error("compress-failed"));
      }, "image/jpeg", quality);
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error("image-load-failed")); };
    img.src = url;
  });
}
/* يحوّل ملف/Blob الصورة المضغوطة إلى نص Base64 (data URL) لتخزينه مباشرة داخل Firestore
   بدون الحاجة لـ Firebase Storage — أسرع ويعمل فوراً بدون أي إعداد إضافي (bucket/CORS/باقة Blaze) */
function blobToBase64(blob){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = ()=> reject(new Error("read-failed"));
    reader.readAsDataURL(blob);
  });
}
/* يضمن أن أي عملية (كتابة في قاعدة البيانات) لن تبقى معلّقة إلى الأبد.
   لو تجاوزت المهلة المحددة، تُرفض العملية برسالة واضحة بدل ما تعلّق الشاشة بصمت. */
function withTimeout(promise, ms, timeoutMessage){
  let timer;
  const timeout = new Promise((_, reject)=>{
    timer = setTimeout(()=>reject(new Error(timeoutMessage)), ms);
  });
  return Promise.race([promise, timeout]).finally(()=>clearTimeout(timer));
}
function styleSheet(sheet){
  const headerRow = sheet.getRow(1);
  headerRow.height = 24;
  headerRow.eachCell(cell=>{
    cell.font = { bold:true, color:{argb:"FFFFFFFF"}, size:12, name:"Calibri" };
    cell.fill = { type:"pattern", pattern:"solid", fgColor:{argb:"FF14477A"} };
    cell.alignment = { horizontal:"center", vertical:"middle" };
    cell.border = { top:{style:"thin"},left:{style:"thin"},right:{style:"thin"},bottom:{style:"thin"} };
  });
  sheet.eachRow((row, rowNumber)=>{
    if(rowNumber===1) return;
    row.height = 20;
    row.eachCell(cell=>{
      cell.alignment = { horizontal:"center", vertical:"middle" };
      cell.font = { size:11, name:"Calibri" };
      cell.border = {
        top:{style:"thin",color:{argb:"FFE6E0CC"}}, left:{style:"thin",color:{argb:"FFE6E0CC"}},
        right:{style:"thin",color:{argb:"FFE6E0CC"}}, bottom:{style:"thin",color:{argb:"FFE6E0CC"}}
      };
      if(rowNumber % 2 === 0){
        cell.fill = { type:"pattern", pattern:"solid", fgColor:{argb:"FFF7F4E9"} };
      }
    });
  });
  sheet.autoFilter = { from:"A1", to:{ row:1, column: sheet.columnCount } };
  sheet.views = [{ rightToLeft: lang==="ar", state:"frozen", ySplit:1 }];
}

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    currentUserDoc = null;
    document.getElementById("app-view").classList.add("hidden");
    document.getElementById("login-view").classList.remove("hidden");
    return;
  }
  const snap = await getDoc(doc(db, "users", user.uid));
  if(!snap.exists()){
    toast(t("loginError"), "error");
    await signOut(auth);
    return;
  }
  if(snap.data().disabled){
    toast(t("accountDisabled"), "error");
    await signOut(auth);
    return;
  }
  currentUserDoc = { uid:user.uid, ...snap.data() };
  if(currentUserDoc.preferredLanguage && currentUserDoc.preferredLanguage !== lang){
    applyLanguage(currentUserDoc.preferredLanguage);
  }
  try{ await updateDoc(doc(db,"users",user.uid), { preferredLanguage: lang }); }catch(_){}

  document.getElementById("login-view").classList.add("hidden");
  document.getElementById("app-view").classList.remove("hidden");

  document.getElementById("user-name").textContent = currentUserDoc.fullName || "";
  document.getElementById("user-avatar").textContent = (currentUserDoc.fullName||"?").trim()[0] || "?";
  document.getElementById("user-role").textContent = t("role"+roleKey(currentUserDoc.role));

  buildNav();
  renderApp();
});

function buildNav(){
  const navEl = document.getElementById("nav-list");
  navEl.innerHTML = "";
  const items = NAV_BY_ROLE[currentUserDoc.role] || ["myCustody"];
  currentNavKey = items[0];
  items.forEach(key=>{
    const btn = document.createElement("button");
    btn.className = "nav-item" + (key===currentNavKey ? " active" : "");
    btn.dataset.nav = key;
    btn.innerHTML = shieldIcon + `<span>${t(NAV_LABELS[key])}</span>`;
    btn.addEventListener("click", ()=>{
      currentNavKey = key;
      navEl.querySelectorAll(".nav-item").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("view-title").textContent = t(NAV_LABELS[key]);
      renderApp();
      closeMobileSidebar();
    });
    navEl.appendChild(btn);
  });
  document.getElementById("view-title").textContent = t(NAV_LABELS[currentNavKey]);
}

/* ---------------- Render dispatcher ---------------- */
function renderApp(){
  clearListeners();
  const content = document.getElementById("content");
  content.innerHTML = "";
  switch(currentNavKey){
    case "myCustody": renderMyCustody(content); break;
    case "incoming": renderIncoming(content); break;
    case "allAssets": renderAllAssets(content); break;
    case "myCustody_admin": renderAllAssets(content); break;
    case "auditLog": renderAuditLog(content); break;
    case "manageUsers": renderManageUsers(content); break;
  }
}

/* ---------------- View: All Assets (admin/assistant/warehouse) ---------------- */
function renderAllAssets(content){
  const canManage = ["admin","assistant_manager","warehouse_manager"].includes(currentUserDoc.role);

  if(canManage){
    const addSection = document.createElement("div");
    addSection.className = "card";
    addSection.innerHTML = `
      <div class="card-title"><h3>${t("newAsset")}</h3></div>
      <form id="create-asset-form" style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
        <div class="field" style="flex:1;min-width:160px;margin-bottom:0;"><label>${t("assetName")}</label><input type="text" id="asset-name" required/></div>
        <div class="field" style="flex:1;min-width:140px;margin-bottom:0;"><label>${t("assetCategory")}</label><input type="text" id="asset-category"/></div>
        <div class="field" style="flex:1;min-width:140px;margin-bottom:0;"><label>${t("serial")}</label><input type="text" id="asset-serial" required/></div>
        <button class="btn btn-primary" type="submit" style="height:44px;">${t("addAsset")}</button>
      </form>`;
    content.appendChild(addSection);
  }

  const section = document.createElement("div");
  section.className = "card";
  section.innerHTML = `
    <div class="card-title">
      <h3>${t("allAssets")}</h3>
      ${["admin","assistant_manager"].includes(currentUserDoc.role) ? `<button class="btn btn-outline btn-sm" id="export-btn">${t("exportReport")}</button>` : ""}
    </div>
    <div style="overflow-x:auto;">
    <table>
      <thead><tr>
        <th>${t("assetName")}</th>
        <th>${t("serial")}</th><th>${t("status")}</th><th>${t("holder")}</th>
        <th>${t("deliveredAt")}</th><th>${t("receivedAt")}</th><th>${t("deliveryLocation")}</th>
        <th>${t("receiptPhoto")}</th><th>${t("deviceCondition")}</th>
        ${canManage?`<th></th>`:""}
      </tr></thead>
      <tbody id="assets-tbody"></tbody>
    </table>
    </div>`;
  content.appendChild(section);

  const createAssetForm = document.getElementById("create-asset-form");
  if(createAssetForm){
    createAssetForm.addEventListener("submit", async (e)=>{
      e.preventDefault();
      try{
        await createAssetDirect({
          name: document.getElementById("asset-name").value.trim(),
          category: document.getElementById("asset-category").value.trim(),
          serialNumber: document.getElementById("asset-serial").value.trim(),
        });
        toast(t("assetAdded"),"success");
        createAssetForm.reset();
      }catch(err){ toast(err.message,"error"); }
    });
  }

  const exportBtn = document.getElementById("export-btn");
  if(exportBtn){
    exportBtn.addEventListener("click", async ()=>{
      exportBtn.disabled = true;
      try{ await exportAssetsReportDirect(); }
      catch(err){ toast(err.message,"error"); }
      exportBtn.disabled = false;
    });
  }

  window.__photoCache = window.__photoCache || {};

  const unsub = onSnapshot(collection(db,"assets"), (snap)=>{
    const tbody = document.getElementById("assets-tbody");
    if(!tbody) return;
    tbody.innerHTML = "";
    snap.forEach(docSnap=>{
      const a = { id:docSnap.id, ...docSnap.data() };
      if(a.lastReceiptImageUrl) window.__photoCache[a.id] = a.lastReceiptImageUrl;
      const tr = document.createElement("tr");
      const locCell = a.lastReceivedLocation
        ? `<a href="https://www.google.com/maps?q=${a.lastReceivedLocation.lat},${a.lastReceivedLocation.lng}" target="_blank" rel="noopener">📍 ${t("viewLocation")}</a>`
        : "-";
      const photoCell = a.lastReceiptImageUrl
        ? `<button type="button" class="btn btn-ghost btn-sm" style="padding:2px 6px;" data-photo-id="${a.id}">🖼️ ${t("viewPhoto")}</button>`
        : "-";
      const conditionCell = a.lastConditionStatus
        ? `<span class="badge ${a.lastConditionStatus==="good" ? "badge-custody" : "badge-maintenance"}">${a.lastConditionStatus==="good" ? t("conditionGood") : t("conditionBad")}</span>`
        : "-";
      tr.innerHTML = `
        <td>${a.name}</td>
        <td>${a.serialNumber||"-"}</td>
        <td>${statusBadge(a.status)}</td>
        <td>${a.currentHolderName || t("statusWarehouse")}</td>
        <td>${fmtDate(a.lastSentAt)}</td>
        <td>${fmtDate(a.lastReceivedAt)}</td>
        <td>${locCell}</td>
        <td>${photoCell}</td>
        <td>${conditionCell}</td>
        ${canManage ? `<td><button class="btn btn-outline btn-sm" data-init="${a.id}">${t("initiateTransfer")}</button></td>` : ""}
      `;
      tbody.appendChild(tr);
    });
    tbody.querySelectorAll("[data-init]").forEach(btn=>{
      btn.addEventListener("click", ()=>openSendTransferModal(btn.dataset.init, true));
    });
    tbody.querySelectorAll("[data-photo-id]").forEach(btn=>{
      btn.addEventListener("click", ()=>openPhotoModal(window.__photoCache[btn.dataset.photoId]));
    });
  });
  activeListeners.push(unsub);
}

/* نافذة معاينة صورة حالة الجهاز (تعمل مع صور Base64 المخزّنة مباشرة في Firestore) */
function openPhotoModal(dataUrl){
  if(!dataUrl) return;
  document.querySelectorAll(".modal-backdrop").forEach(el=>el.remove());
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML = `
    <div class="modal" style="text-align:center;">
      <img src="${dataUrl}" style="max-width:100%;border-radius:10px;margin-bottom:14px;" />
      <button class="btn btn-outline" id="close-photo-modal" style="width:100%;justify-content:center;">${t("cancel")}</button>
    </div>`;
  document.body.appendChild(backdrop);
  backdrop.querySelector("#close-photo-modal").addEventListener("click", ()=>backdrop.remove());
  backdrop.addEventListener("click", (e)=>{ if(e.target===backdrop) backdrop.remove(); });
}

/* ---------------- View: Audit Log ---------------- */
function renderAuditLog(content){
  const section = document.createElement("div");
  section.className = "card";
  section.innerHTML = `<div class="card-title"><h3>${t("auditLog")}</h3></div>
    <div style="overflow-x:auto;"><table>
      <thead><tr><th>${t("action")}</th><th>${t("date")}</th><th>${t("performedBy")}</th><th>${t("deliveryLocation")}</th></tr></thead>
      <tbody id="audit-tbody"></tbody>
    </table></div>`;
  content.appendChild(section);

  const q = query(collection(db,"auditLog"), orderBy("timestamp","desc"));
  const unsub = onSnapshot(q, (snap)=>{
    const tbody = document.getElementById("audit-tbody");
    if(!tbody) return;
    tbody.innerHTML = "";
    snap.forEach(docSnap=>{
      const l = docSnap.data();
      const dateStr = fmtDate(l.timestamp);
      const locCell = l.location
        ? `<a href="https://www.google.com/maps?q=${l.location.lat},${l.location.lng}" target="_blank" rel="noopener">📍 ${t("viewLocation")}</a>`
        : "-";
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${l.action}</td><td>${dateStr}</td><td>${l.performedByName||""}</td><td>${locCell}</td>`;
      tbody.appendChild(tr);
    });
  });
  activeListeners.push(unsub);
}

/* ---------------- View: Manage Users ---------------- */
function renderManageUsers(content){
  const section = document.createElement("div");
  section.className = "card";
  section.style.maxWidth = "460px";
  section.innerHTML = `
    <div class="card-title"><h3>${t("newUser")}</h3></div>
    <form id="create-user-form">
      <div class="field"><label>${t("fullName")}</label><input type="text" id="nu-name" required/></div>
      <div class="field"><label>${t("username")}</label><input type="text" id="nu-username" autocapitalize="off" autocorrect="off" required/></div>
      <div class="field"><label>${t("password")}</label><input type="password" id="nu-pass" required minlength="6"/></div>
      <div class="field"><label>${t("phone")}</label><input type="tel" id="nu-phone"/></div>
      <div class="field">
        <label>${t("role")}</label>
        <select id="nu-role">
          <option value="technician">${t("roleTechnician")}</option>
          <option value="warehouse_manager">${t("roleWarehouse")}</option>
          <option value="assistant_manager">${t("roleAssistant")}</option>
          <option value="admin">${t("roleAdmin")}</option>
        </select>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" type="submit">${t("createUser")}</button>
    </form>`;
  content.appendChild(section);

  document.getElementById("create-user-form").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const payload = {
      fullName: document.getElementById("nu-name").value.trim(),
      username: document.getElementById("nu-username").value.trim(),
      password: document.getElementById("nu-pass").value,
      phone: document.getElementById("nu-phone").value.trim(),
      role: document.getElementById("nu-role").value,
    };
    const btn = e.target.querySelector("button[type=submit]");
    btn.disabled = true;
    try{
      await createUserByAdmin(payload);
      toast(t("userCreated"),"success");
      e.target.reset();
    }catch(err){ toast(err.message,"error"); }
    btn.disabled = false;
  });

  /* قائمة المستخدمين الحاليين: تعديل الصلاحية + تعطيل/تفعيل الحساب */
  const listSection = document.createElement("div");
  listSection.className = "card";
  listSection.innerHTML = `
    <div class="card-title"><h3>${t("usersList")}</h3></div>
    <div style="overflow-x:auto;"><table>
      <thead><tr><th>${t("fullName")}</th><th>${t("username")}</th><th>${t("role")}</th><th>${t("status")}</th></tr></thead>
      <tbody id="users-tbody"></tbody>
    </table></div>`;
  content.appendChild(listSection);

  const unsub = onSnapshot(collection(db,"users"), (snap)=>{
    const tbody = document.getElementById("users-tbody");
    if(!tbody) return;
    tbody.innerHTML = "";
    snap.forEach(docSnap=>{
      const u = { id:docSnap.id, ...docSnap.data() };
      const tr = document.createElement("tr");
      const isSelf = u.id === currentUserDoc.uid;
      tr.innerHTML = `
        <td>${u.fullName||""}</td>
        <td>${u.username||"-"}</td>
        <td>
          <select data-role-for="${u.id}" ${isSelf?"disabled":""}>
            <option value="technician" ${u.role==="technician"?"selected":""}>${t("roleTechnician")}</option>
            <option value="warehouse_manager" ${u.role==="warehouse_manager"?"selected":""}>${t("roleWarehouse")}</option>
            <option value="assistant_manager" ${u.role==="assistant_manager"?"selected":""}>${t("roleAssistant")}</option>
            <option value="admin" ${u.role==="admin"?"selected":""}>${t("roleAdmin")}</option>
          </select>
        </td>
        <td>
          <button class="btn btn-sm ${u.disabled?'btn-success':'btn-danger'}" data-toggle-disable="${u.id}" data-current="${!!u.disabled}" ${isSelf?"disabled":""}>
            ${u.disabled ? t("enableUser") : t("disableUser")}
          </button>
        </td>`;
      tbody.appendChild(tr);
    });
    tbody.querySelectorAll("[data-role-for]").forEach(sel=>{
      sel.addEventListener("change", async ()=>{
        try{ await updateDoc(doc(db,"users",sel.dataset.roleFor), { role: sel.value }); toast(t("userUpdated"),"success"); }
        catch(err){ toast(err.message,"error"); }
      });
    });
    tbody.querySelectorAll("[data-toggle-disable]").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const newVal = btn.dataset.current !== "true";
        try{ await updateDoc(doc(db,"users",btn.dataset.toggleDisable), { disabled: newVal }); toast(t("userUpdated"),"success"); }
        catch(err){ toast(err.message,"error"); }
      });
    });
  });
  activeListeners.push(unsub);
}

/* ---------------- Modal: Send Transfer ---------------- */
async function openSendTransferModal(assetId, adminMode=false){
  document.querySelectorAll(".modal-backdrop").forEach(el=>el.remove());
  const assetSnap = await getDoc(doc(db,"assets",assetId));
  const assetName = assetSnap.data()?.name || "";
  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML = `
    <div class="modal">
      <h3>${t("sendTransfer")}</h3>
      <div class="field" style="margin-top:16px;">
        <label>${t("selectRecipient")}</label>
        <select id="recipient-select"><option value="">...</option></select>
      </div>
      <div class="field">
        <label>${t("notes")}</label>
        <textarea id="transfer-notes" rows="2"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="cancel-modal">${t("cancel")}</button>
        <button class="btn btn-primary" id="confirm-send">${t("send")}</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);

  // تحميل قائمة المستخدمين (فنيين + مسؤولي مستودع) كخيارات للمستلم
  const allUsersSnap = await getDocs(collection(db,"users"));
  const select = backdrop.querySelector("#recipient-select");
  allUsersSnap.forEach(u=>{
    const data = u.data();
    if(u.id === currentUserDoc.uid) return;
    if(!["technician","warehouse_manager"].includes(data.role)) return;
    const opt = document.createElement("option");
    opt.value = u.id; opt.textContent = `${data.fullName} (${t("role"+roleKey(data.role))})`;
    select.appendChild(opt);
  });

  backdrop.querySelector("#cancel-modal").addEventListener("click", ()=>backdrop.remove());
  backdrop.querySelector("#confirm-send").addEventListener("click", async (e)=>{
    const toUserId = select.value;
    if(!toUserId){ toast(t("requiredField"),"error"); return; }
    const toUserName = select.options[select.selectedIndex].textContent;
    e.target.disabled = true;
    try{
      await requestTransfer({
        assetId, assetName, toUserId, toUserName,
        notes: backdrop.querySelector("#transfer-notes").value.trim()
      });
      toast(t("requestSent"),"success");
      backdrop.remove();
    }catch(err){ toast(err.message,"error"); e.target.disabled=false; }
  });
}

/* ---------------- Modal: Accept Transfer (GPS + Mandatory Photo) ---------------- */
function openAcceptModal(transferId){
  // إزالة أي نافذة منبثقة سابقة عالقة قبل فتح واحدة جديدة
  document.querySelectorAll(".modal-backdrop").forEach(el=>el.remove());

  const backdrop = document.createElement("div");
  backdrop.className = "modal-backdrop";
  backdrop.innerHTML = `
    <div class="modal">
      <h3>${t("confirmAccept")}</h3>
      <div class="sub">${t("acceptInstructions")}</div>
      <div class="field">
        <label>${t("conditionPhoto")}</label>
        <input type="file" id="condition-photo" accept="image/*" capture="environment" required/>
      </div>
      <div class="field">
        <label>${t("selectCondition")}</label>
        <div style="display:flex;gap:10px;">
          <button type="button" class="btn btn-outline" style="flex:1;justify-content:center;" data-cond="good">${t("conditionGood")}</button>
          <button type="button" class="btn btn-outline" style="flex:1;justify-content:center;" data-cond="bad">${t("conditionBad")}</button>
        </div>
      </div>
      <div id="gps-status" class="qr-status wait">${t("capturingGps")}</div>
      <div class="modal-actions">
        <button class="btn btn-outline" id="cancel-accept">${t("cancel")}</button>
        <button class="btn btn-success" id="confirm-accept-btn">${t("confirmAccept")}</button>
      </div>
    </div>`;
  document.body.appendChild(backdrop);

  let gpsCoords = null;
  let selectedCondition = null;
  const condButtons = backdrop.querySelectorAll("[data-cond]");
  condButtons.forEach(b=>{
    b.addEventListener("click", ()=>{
      selectedCondition = b.dataset.cond;
      condButtons.forEach(x=>{
        x.classList.remove("btn-success","btn-danger","btn-outline");
        if(x === b){ x.classList.add(x.dataset.cond === "good" ? "btn-success" : "btn-danger"); }
        else { x.classList.add("btn-outline"); }
      });
    });
  });

  // GPS capture
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        gpsCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        const el = backdrop.querySelector("#gps-status");
        if(el){ el.textContent = t("gpsOk"); el.className = "qr-status ok"; }
      },
      ()=>{ /* تجاهل الفشل، القبول يستمر بدون GPS */ }
    );
  }

  function closeModal(){
    backdrop.remove();
  }

  backdrop.querySelector("#cancel-accept").addEventListener("click", closeModal);
  backdrop.querySelector("#confirm-accept-btn").addEventListener("click", async (e)=>{
    const file = backdrop.querySelector("#condition-photo").files[0];
    if(!file){ toast(t("photoRequired"),"error"); return; }
    if(!selectedCondition){ toast(t("conditionRequired"),"error"); return; }

    const confirmBtn = e.target;
    const cancelBtn = backdrop.querySelector("#cancel-accept");
    const originalLabel = confirmBtn.textContent;
    confirmBtn.disabled = true;
    cancelBtn.disabled = true;
    confirmBtn.textContent = t("saving");

    try{
      // فحص سريع للاتصال قبل أي محاولة — يمنع الانتظار لو كان الجهاز أوفلاين أساساً
      if(navigator.onLine === false){ throw new Error(t("offlineError")); }
      // نضغط الصورة لحجم صغير جداً ثم نحوّلها إلى Base64 ونخزّنها مباشرة في Firestore
      // (بدل الرفع لـ Firebase Storage الذي يحتاج تفعيل باقة Blaze + إعداد bucket/CORS)
      const compressed = await compressImage(file).catch(()=>file);
      const conditionImageUrl = await withTimeout(blobToBase64(compressed), 15000, t("uploadTimeout"));
      // مهلة قصوى 30 ثانية لحفظ البيانات في Firestore
      await withTimeout(
        acceptTransfer({ transferId, gpsLocation: gpsCoords, conditionImageUrl, conditionStatus: selectedCondition }),
        30000, t("saveTimeout")
      );
      toast(t("accepted"),"success");
      closeModal();
    }catch(err){
      toast(err?.message || t("loginError"), "error");
      confirmBtn.disabled = false;
      cancelBtn.disabled = false;
      confirmBtn.textContent = originalLabel;
    }
  });
}
